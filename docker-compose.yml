services:
  db:
    image: postgres:16-alpine
    container_name: ngtu-db
    environment:
      POSTGRES_DB: ngtu_code_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deploy/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ngtu_code_platform"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: ngtu-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/ngtu_code_platform
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET_BASE64: ${JWT_SECRET_BASE64:?JWT_SECRET_BASE64 is required}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      JUDGE_PYTHON_EXECUTABLE: python3
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: ngtu-frontend
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  pg_data:
