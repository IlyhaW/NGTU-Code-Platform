spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# БД уже существует — схему не меняем
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=auth

server.port=8080

# JWT secret:
# - для HS512 ключ должен быть минимум 64 байта
# - рекомендуемый формат: base64
jwt.secret-base64=${JWT_SECRET_BASE64}
jwt.expiration-ms=86400000

# OpenRouter API for variants generation (or set env OPENROUTER_API_KEY)
openrouter.api-key=${OPENROUTER_API_KEY:}
openrouter.model=google/gemini-2.0-flash-001
openrouter.referer=http://localhost
openrouter.app-title=ngtu-code-platform

# Python runner for student code checks
judge.python.executable=python

